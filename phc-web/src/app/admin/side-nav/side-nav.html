<mat-nav-list>
    <div class="logo-container">
        <img src="assets/images/logo.png" alt="Logo">
    </div>

    @for (navItem of sideNavItems; track $index) {
    <a mat-list-item routerLink="{{navItem.path}}" routerLinkActive="active">
        <mat-icon matListItemIcon>{{navItem.icon}}</mat-icon>
        <span matListItemTitle i18n="@@sidenav.{{navItem.label}}">{{navItem.label}}</span>
    </a>
    }
</mat-nav-list>
