<form [formGroup]="form" (ngSubmit)="onSubmit()" class="patient-form">
    <div class="row">
        <mat-form-field appearance="outline">
            <mat-label>Full Name</mat-label>
            <input matInput formControlName="full_name" placeholder="Enter patient name">
            @if (form.get('full_name')?.hasError('required')) {
            <mat-error>Full name is required</mat-error>
            }
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Age</mat-label>
            <input matInput type="number" formControlName="age">
            @if (form.get('age')?.hasError('required')) {
            <mat-error>Age is required</mat-error>
            }
        </mat-form-field>
    </div>

    <div class="row">
        <mat-form-field appearance="outline">
            <mat-label>Gender</mat-label>
            <mat-select formControlName="gender">
                <mat-option value="male">Male</mat-option>
                <mat-option value="female">Female</mat-option>
                <mat-option value="other">Other</mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Aadhaar Number</mat-label>
            <input matInput formControlName="aadhaar_number" placeholder="12 digit Aadhaar">
        </mat-form-field>
    </div>

    <div class="row">
        <mat-form-field appearance="outline">
            <mat-label>Mobile Number</mat-label>
            <input matInput formControlName="mobile_number" placeholder="10 digit mobile">
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Village Code</mat-label>
            <input matInput formControlName="village_code" placeholder="Enter village code">
        </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
        <mat-label>Address</mat-label>
        <textarea matInput formControlName="address" rows="3"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
        <mat-label>Created By ASHA ID</mat-label>
        <input matInput formControlName="created_by_asha_id">
    </mat-form-field>

    <div class="form-actions">
        <button type="button" mat-stroked-button (click)="cancel.emit()">Cancel</button>
        <button type="submit" mat-flat-button color="primary" [disabled]="form.invalid">
            {{ patient() ? 'Update' : 'Create' }} Patient
        </button>
    </div>
</form>
