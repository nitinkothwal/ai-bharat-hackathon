<div class="page-container">
    <div class="page-header">
        <h1>Patients</h1>
        <button mat-flat-button color="primary" routerLink="new">
            <mat-icon>add</mat-icon>
            Add Patient
        </button>
    </div>

    <div class="table-container mat-elevation-z1">
        <table mat-table [dataSource]="patients()">
            <ng-container matColumnDef="patient_id">
                <th mat-header-cell *matHeaderCellDef>Patient ID</th>
                <td mat-cell *matCellDef="let patient">
                    <a [routerLink]="[patient.patient_id, 'details']">{{ patient.patient_id }}</a>
                </td>
            </ng-container>

            <ng-container matColumnDef="full_name">
                <th mat-header-cell *matHeaderCellDef>Name</th>
                <td mat-cell *matCellDef="let patient">{{ patient.full_name }}</td>
            </ng-container>

            <ng-container matColumnDef="age">
                <th mat-header-cell *matHeaderCellDef>Age</th>
                <td mat-cell *matCellDef="let patient">{{ patient.age }}</td>
            </ng-container>

            <ng-container matColumnDef="gender">
                <th mat-header-cell *matHeaderCellDef>Gender</th>
                <td mat-cell *matCellDef="let patient">{{ patient.gender | titlecase }}</td>
            </ng-container>

            <ng-container matColumnDef="village_code">
                <th mat-header-cell *matHeaderCellDef>Village</th>
                <td mat-cell *matCellDef="let patient">{{ patient.village_code }}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let patient">
                    <button mat-icon-button [routerLink]="[patient.patient_id]">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="deletePatient(patient.patient_id)">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        @if (patients().length === 0) {
            <div class="empty-state">
                No patients found.
            </div>
        }
    </div>
</div>
