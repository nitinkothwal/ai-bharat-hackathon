<mat-toolbar>
    <button mat-icon-button aria-label="Toggle menu" (click)="menuToggle.emit()">
        <mat-icon>menu</mat-icon>
    </button>
    <div class="logo-container">
        <mat-icon class="app-logo-icon">library_books</mat-icon>
        <span class="app-title">Bharat Care Link</span>
    </div>
    <span class="spacer"></span>

    @if (user(); as u) {
    <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="User profile">
        <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
        <div class="user-info-item" mat-menu-item disabled>
            <mat-icon>person</mat-icon>
            <span>{{ u.first_name }} {{ u.last_name }}</span>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
        </button>
    </mat-menu>
    }
</mat-toolbar>
